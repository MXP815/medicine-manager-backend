
  databaseChangeLog:
    - changeSet:
        id: 008-create-role-table
        author: system
        comment: 创建角色表
        changes:
          - createTable:
              tableName: t_role
              remarks: 角色表
              columns:
                - column:
                    name: id
                    type: BIGINT
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: name
                    type: VARCHAR(50)
                    constraints:
                      nullable: false
                    remarks: 角色名称
                - column:
                    name: code
                    type: VARCHAR(50)
                    constraints:
                      nullable: false
                      unique: true
                    remarks: 角色编码
                - column:
                    name: description
                    type: VARCHAR(200)
                    remarks: 角色描述
                - column:
                    name: permissions
                    type: TEXT
                    remarks: 权限配置（JSON格式）
                - column:
                    name: status
                    type: INT
                    defaultValueNumeric: 1
                    remarks: 状态：0-禁用 1-启用
                - column:
                    name: create_time
                    type: DATETIME
                    defaultValueComputed: CURRENT_TIMESTAMP
                    remarks: 创建时间
                - column:
                    name: update_time
                    type: DATETIME
                    defaultValueComputed: CURRENT_TIMESTAMP
                    remarks: 更新时间
                - column:
                    name: deleted
                    type: TINYINT
                    defaultValueNumeric: 0
                    remarks: 逻辑删除标识
          - createIndex:
              indexName: idx_code
              tableName: t_role
              unique: true
              columns:
                - column:
                    name: code

    - changeSet:
        id: 013-create-system-config-table
        author: system
        comment: 创建系统配置表
        changes:
          - createTable:
              tableName: t_system_config
              remarks: 系统配置表
              columns:
                - column:
                    name: id
                    type: BIGINT
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: config_key
                    type: VARCHAR(100)
                    constraints:
                      nullable: false
                      unique: true
                    remarks: 配置键
                - column:
                    name: config_value
                    type: TEXT
                    remarks: 配置值
                - column:
                    name: description
                    type: VARCHAR(200)
                    remarks: 配置描述
                - column:
                    name: category
                    type: VARCHAR(50)
                    remarks: 配置分类
                - column:
                    name: create_time
                    type: DATETIME
                    defaultValueComputed: CURRENT_TIMESTAMP
                    remarks: 创建时间
                - column:
                    name: update_time
                    type: DATETIME
                    defaultValueComputed: CURRENT_TIMESTAMP
                    remarks: 更新时间
                - column:
                    name: deleted
                    type: TINYINT
                    defaultValueNumeric: 0
                    remarks: 逻辑删除标识
          - createIndex:
              indexName: idx_config_key
              tableName: t_system_config
              unique: true
              columns:
                - column:
                    name: config_key
          - createIndex:
              indexName: idx_category
              tableName: t_system_config
              unique: false
              columns:
                - column:
                    name: category

