          - insert:
              tableName: t_role
              columns:
                - column:
                    name: name
                    value: 质检员
                - column:
                    name: code
                    value: QUALITY
                - column:
                    name: description
                    value: 质量管理
                - column:
                    name: status
                    valueNumeric: 1
          - insert:
              tableName: t_role
