    - changeSet:
        id: 015-init-system-config
        author: system
        comment: 初始化系统配置数据
        changes:
          - insert:
              tableName: t_system_config
              columns:
                - column:
                    name: config_key
                    value: system.name
                - column:
                    name: config_value
                    value: 医药管理系统
                - column:
                    name: description
                    value: 系统名称
                - column:
                    name: category
                    value: basic
          - insert:
              tableName: t_system_config
              columns:
                - column:
                    name: config_key
                    value: system.version
                - column:
                    name: config_value
                    value: 1.0.0
                - column:
                    name: description
                    value: 系统版本
                - column:
                    name: category
                    value: basic
          - insert:
              tableName: t_system_config
              columns:
                - column:
                    name: config_key
                    value: page.size
                - column:
                    name: config_value
                    value: "10"
                - column:
                    name: description
                    value: 每页显示条数
                - column:
                    name: category
                    value: basic
          - insert:
              tableName: t_system_config
              columns:
                - column:
                    name: config_key
                    value: token.expire.hours
                - column:
                    name: config_value
                    value: "24"
                - column:
                    name: description
                    value: Token过期时间(小时)
                - column:
                    name: category
                    value: basic
          - insert:
              tableName: t_system_config
              columns:
                - column:
                    name: config_key
                    value: notification.email.enabled
                - column:
                    name: config_value
                    value: "false"
                - column:
                    name: description
                    value: 启用邮件通知
                - column:
                    name: category
                    value: notification
          - insert:
              tableName: t_system_config
              columns:
                - column:
                    name: config_key
                    value: notification.sms.enabled
                - column:
                    name: config_value
                    value: "false"
                - column:
                    name: description
                    value: 启用短信通知
                - column:
                    name: category
                    value: notification
          - insert:
              tableName: t_system_config
              columns:
                - column:
                    name: config_key
                    value: inventory.warning.threshold
                - column:
                    name: config_value
                    value: "10"
                - column:
                    name: description
                    value: 库存预警阈值
                - column:
                    name: category
                    value: notification
          - insert:
              tableName: t_system_config
              columns:
                - column:
                    name: config_key
                    value: expiry.warning.days
                - column:
                    name: config_value
                    value: "90"
                - column:
                    name: description
                    value: 效期预警天数
                - column:
                    name: category
                    value: notification
