databaseChangeLog:
  - changeSet:
      id: 005-create-user-table
      author: system
      comment: 创建用户表
      changes:
        - createTable:
            tableName: t_user
            remarks: 用户表
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
                  remarks: 用户名
              - column:
                  name: password
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                  remarks: 密码（加密存储）
              - column:
                  name: real_name
                  type: VARCHAR(50)
                  remarks: 真实姓名
              - column:
                  name: phone
                  type: VARCHAR(20)
                  remarks: 手机号
              - column:
                  name: email
                  type: VARCHAR(100)
                  remarks: 邮箱
              - column:
                  name: role
                  type: INT
                  constraints:
                    nullable: false
                  remarks: 角色：1-管理员 2-采购员 3-库管 4-销售员 5-质量管理员 6-财务
              - column:
                  name: status
                  type: INT
                  defaultValueNumeric: 1
                  remarks: 状态：0-禁用 1-正常
              - column:
                  name: department
                  type: VARCHAR(50)
                  remarks: 部门
              - column:
                  name: last_login_time
                  type: DATETIME
                  remarks: 最后登录时间
              - column:
                  name: create_time
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
              - column:
                  name: update_time
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 更新时间
              - column:
                  name: deleted
                  type: TINYINT
                  defaultValueNumeric: 0
                  remarks: 逻辑删除标识
        - createIndex:
            indexName: idx_username
            tableName: t_user
            unique: false
            columns:
              - column:
                  name: username

  - changeSet:
      id: 006-create-operation-log-table
      author: system
      comment: 创建操作日志表（GSP 合规要求）
      changes:
        - createTable:
            tableName: t_operation_log
            remarks: 操作日志表
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                  remarks: 用户 ID
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                  remarks: 用户名
              - column:
                  name: module
                  type: VARCHAR(50)
                  remarks: 模块
              - column:
                  name: operation
                  type: VARCHAR(100)
                  remarks: 操作
              - column:
                  name: method
                  type: VARCHAR(200)
                  remarks: 请求方法
              - column:
                  name: params
                  type: TEXT
                  remarks: 请求参数
              - column:
                  name: result
                  type: TEXT
                  remarks: 返回结果
              - column:
                  name: time_taken
                  type: BIGINT
                  remarks: 耗时（毫秒）
              - column:
                  name: ip_address
                  type: VARCHAR(50)
                  remarks: IP 地址
              - column:
                  name: create_time
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  remarks: 创建时间
        - createIndex:
            indexName: idx_user_id
            tableName: t_operation_log
            unique: false
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_create_time
            tableName: t_operation_log
            unique: false
            columns:
              - column:
                  name: create_time

  - changeSet:
      id: 007-insert-default-admin-user
      author: system
      comment: 插入默认管理员用户
      changes:
        - insert:
            tableName: t_user
            columns:
              - column:
                  name: username
                  value: admin
              - column:
                  name: password
                  value: $2a$10$N.zmdr9k7uOCQb376NoUnuTJ8iAt6Z5EHsM8lEkkfAMdBLXqVgPGm
              - column:
                  name: real_name
                  value: 系统管理员
              - column:
                  name: role
                  valueNumeric: 1
              - column:
                  name: status
                  valueNumeric: 1
              - column:
                  name: department
                  value: 信息部
